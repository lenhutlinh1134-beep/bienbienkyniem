<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Memory Book Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Sriracha&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .portal-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--c-paper-light);
      background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
      font-family: var(--f-sans);
    }
    .portal-title {
      font-family: var(--f-title);
      font-size: 3rem;
      color: var(--c-accent-dark);
      margin-bottom: 40px;
      text-align: center;
    }
    .portal-links {
      display: flex;
      gap: 30px;
    }
    .portal-card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      text-decoration: none;
      color: var(--c-text-dark);
      transition: transform 0.3s, box-shadow 0.3s;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .portal-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }
    .portal-card i {
      font-size: 3rem;
      color: var(--c-accent-light);
      margin-bottom: 15px;
    }
    .portal-card h3 {
      font-family: var(--f-title);
      font-size: 1.5rem;
    }
  </style>
  <link rel="stylesheet" crossorigin href="./assets/main-COVvoMKN.css">
</head>
<body>
  <div class="portal-container">
    <h1 class="portal-title">The Memory Books</h1>
    <div class="portal-links">
      <a href="bien.html" class="portal-card">
        <i class="fa-solid fa-book-open"></i>
        <h3>TRẦN NGUYỄN BIỂN</h3>
      </a>
      <a href="baongoc.html" class="portal-card">
        <i class="fa-solid fa-book-open"></i>
        <h3>BẢO NGỌC</h3>
      </a>
    </div>
  </div>
</body>
</html>
